random_seed: 42

project_root: /home/dheirav/Code/Deepfake_Detection/deepfake-project
artifacts_dir: /home/dheirav/Code/Deepfake_Detection/deepfake-project/dataset_builder/output/artifacts/defacto
export_root: /home/dheirav/Code/Deepfake_Detection/deepfake-project/dataset_builder
dataset_version: v1

source_dirs:
  - data_sources/ai_edited/DEFACTO

class_map:
  data_sources/ai_edited/DEFACTO: ai_edited

image_rules:
  min_width: 256
  min_height: 256
  target_resolution: 512
  blur_threshold: 80
  aspect_ratio_min: 0.5
