# FLUX.1 Generated Images Config
# Source: HuggingFace community datasets — FLUX.1 dev/schnell outputs (2024)
# FLUX.1 is the dominant open-source image generation model as of 2024–2025,
# developed by Black Forest Labs (ex-Stability AI team).
#
# Recommended datasets to search on HuggingFace:
#   - Search: https://huggingface.co/datasets?search=flux+generated
#   - Example: prithivMLmods/FLUX.1-generated-images (verify availability)
#   - Example: Shakker-Labs/FLUX.1-dev-LoRA-collections (LoRA outputs)
#   - Example: glif/FLUX1-gallery
#
# Download (adjust dataset name after verifying on HuggingFace):
#   pip install huggingface-hub datasets
#   from datasets import load_dataset
#   ds = load_dataset("<dataset_name>", split="train", streaming=True)
#   # Save images into data_sources/ai_generated/FLUX/
#   for i, example in enumerate(ds):
#       example["image"].save(f"data_sources/ai_generated/FLUX/flux_{i:06d}.png")
#       if i >= 4000: break
#
# Note: Only use photorealistic FLUX.1 outputs. Avoid LoRA fine-tuned artistic styles.

random_seed: 42

project_root: /home/dheirav/Code/Deepfake_Detection/deepfake-project
artifacts_dir: /home/dheirav/Code/Deepfake_Detection/deepfake-project/dataset_builder/output/artifacts/flux
export_root: /home/dheirav/Code/Deepfake_Detection/deepfake-project/dataset_builder
dataset_version: v1

source_dirs:
  - data_sources/ai_generated/FLUX

class_map:
  data_sources/ai_generated/FLUX: ai_generated

image_rules:
  min_width: 256
  min_height: 256
  target_resolution: 512
  blur_threshold: 80
  aspect_ratio_min: 0.5
  aspect_ratio_max: 2.0
  compression_heuristic: false
  compression_size_per_pixel: 0.15

class_targets:
  ai_generated: 3000

split_ratios:
  train: 0.7
  val: 0.15
  test: 0.15

min_quality_score: 0.7
max_total_images: 3000
per_source_max_fraction: 1.0
phash_hamming_threshold: 8
phash_bucket_chars: 12
phash_cluster_threshold: 8
strict_mode: true
max_missing_pct: 1.0
max_leakage_allowed: 0
max_malformed_pct: 1.0
max_low_quality_pct: 10
quality_hist_bins: [0, 0.5, 0.7, 0.8, 0.9, 0.95, 1.0]
anomaly_cap: 1000
