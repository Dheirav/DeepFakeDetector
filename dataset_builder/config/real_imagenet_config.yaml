random_seed: 42

project_root: /home/dheirav/Code/Deepfake_Detection/deepfake-project
artifacts_dir: /home/dheirav/Code/Deepfake_Detection/deepfake-project/dataset_builder/output/artifacts/imagenet
export_root: /home/dheirav/Code/Deepfake_Detection/deepfake-project/dataset_builder
dataset_version: v1

# ImageNet-1k (photo subset)
# Natural objects, tools, animals, landscapes — 1000 synset classes.
# All images are real camera photographs. No artistic or synthetic content.
# Access: https://huggingface.co/datasets/ILSVRC/imagenet-1k (free, requires account)
source_dirs:
  - data_sources/real/ImageNet

class_map:
  data_sources/real/ImageNet: real

image_rules:
  min_width: 256
  min_height: 256
  target_resolution: 512
  blur_threshold: 80
  aspect_ratio_min: 0.5
  aspect_ratio_max: 2.0
  compression_heuristic: false
  compression_size_per_pixel: 0.15

class_targets:
  real: 4000

split_ratios:
  train: 0.7
  val: 0.15
  test: 0.15

min_quality_score: 0.7
max_total_images: 4000
per_source_max_fraction: 1.0

phash_hamming_threshold: 8
phash_bucket_chars: 12
phash_cluster_threshold: 8

strict_mode: true
max_missing_pct: 1.0
max_leakage_allowed: 0
max_malformed_pct: 1.0
max_low_quality_pct: 10
quality_hist_bins: [0, 0.5, 0.7, 0.8, 0.9, 0.95, 1.0]
anomaly_cap: 1000
